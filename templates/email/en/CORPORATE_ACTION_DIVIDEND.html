<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; color: #1a1a1a; max-width: 560px; margin: 0 auto;">
  <h2 style="color:#2e7d32;">Dividend Credited</h2>
  <p>Dear {{ customer_name }},</p>
  <p>A dividend of <strong>Rs. {{ dividend_amount }}</strong> for
     <strong>{{ symbol }}</strong> ({{ shares_held }} shares) has been
     credited to your linked bank account on {{ credit_date }}.</p>
  <p style="font-size:12px;color:#777;">TDS of Rs. {{ tds_amount | default(0) }}
     has been deducted as applicable.</p>
</body>
</html>
